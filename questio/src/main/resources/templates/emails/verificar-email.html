<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px;">
<div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px;">
    <h2 style="color: #6200EE;">Bem-vindo ao Questio!</h2>
    <p>Olá <strong th:text="${nomeUsuario}"></strong>,</p>
    <p>Falta apenas um passo para você começar a sua jornada. Por favor, confirme seu e-mail clicando no botão
        abaixo:</p>

    <div style="text-align: center; margin: 30px 0;">
        <a th:href="${urlLink}"
           style="background-color: #6200EE; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold;">Verificar
            Meu E-mail</a>
    </div>

    <p style="color: #777; font-size: 12px;">Se você não se cadastrou no Questio, pode ignorar este e-mail.</p>
</div>
</body>
</html>

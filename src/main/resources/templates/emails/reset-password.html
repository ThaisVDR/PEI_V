<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f5f7;">
<table align="center" border="0" cellpadding="0" cellspacing="0" width="600"
       style="border-collapse: collapse; background-color: #ffffff; margin-top: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <tr>
        <td align="center" bgcolor="#6200EE"
            style="padding: 40px 0; border-top-left-radius: 8px; border-top-right-radius: 8px;">
            <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: bold; letter-spacing: 1px;">QUESTIO</h1>
        </td>
    </tr>
    <tr>
        <td style="padding: 40px 30px;">
            <p style="margin: 0 0 20px 0; font-size: 16px; color: #333333; line-height: 1.5;">Olá,</p>
            <p style="margin: 0 0 30px 0; font-size: 16px; color: #555555; line-height: 1.5;">
                Você solicitou a redefinição de sua senha no Questio.
                Clique no botão abaixo para criar uma nova credencial.
                Este link é válido por 15 minutos.</p>

            <table align="center" border="0" cellpadding="0" cellspacing="0" style="margin-bottom: 30px;">
                <tr>
                    <td align="center" bgcolor="#6200EE" style="border-radius: 4px;">
                        <a th:href="${urlLink}" target="_blank"
                           style="padding: 12px 24px; color: #ffffff; font-size: 16px; font-weight: bold; text-decoration: none; display: inline-block;">
                            Redefinir Minha Senha</a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
